experiment_name: roi_vfc_deeplabv3_ytvos_codec_bitrate16
seed: 42

model:
  roi_vfc:
    img_channels: 3
    feat_channels: 64
    y_chan: 96
    lambda_rd: 0.01
  feature_extraction:
    backbone: resnet50
    pretrained: true
    freeze: true
  perception_extraction:
    backbone: resnet50
    pretrained: true
    remove_res1: true
    freeze: true
  feature_space_transfer:
    in_channel: 256
    mid_channel: 64
  deeplabv3:
    backbone: resnet50
    pretrained: true
    weights_path: outputs/deeplabv3_vos2019_resnet50/deeplabv3_resnet50_best.pt
    freeze: true
    aux_weight: 0.4

data:
  dataset_name: ytvos
  data_root: data/VOS2019
  train_split: train
  valid_split: valid
  image_size: [128, 128]
  spatial_transform: crop   # crop | resize
  train_crop_type: random   # random | center
  valid_crop_type: center   # random | center
  pad_if_needed: true
  max_train_samples: null
  max_valid_samples: null

training:
  epochs: 30
  train_batch_size: 8
  valid_batch_size: 1
  lr: 1.0e-4
  weight_decay: 1.0e-4
  num_workers: 4
  device: auto
  print_freq: 20
  stages:
    # Table 1 - Stage 1: 0.5 * lambda_r * R_y + lambda_f D_f + lambda_c D_c + lambda_p D_p
    - name: codec_stage_1
      optimize: codec
      epochs: 4
      lr: 1.0e-4
      weight_decay: 1.0e-4
      codec:
        rate_scale: 0.5
        include_rz: false
    # Table 1 - Stage 2: 0.5 * lambda_r * (R_y + R_z)
    - name: codec_stage_2
      optimize: codec
      epochs: 4
      lr: 1.0e-4
      weight_decay: 1.0e-4
      codec:
        rate_scale: 0.5
        include_rz: true
    # Table 1 - Stage 3: lambda_r * (R_y + R_z)
    - name: codec_stage_3
      optimize: codec
      epochs: 4
      lr: 1.0e-4
      weight_decay: 1.0e-4
      codec:
        rate_scale: 1.0
        include_rz: true
    # Table 1 - Stage 4: same loss as stage 3, lower LR
    - name: codec_stage_4
      optimize: codec
      epochs: 4
      lr: 5.0e-5
      weight_decay: 1.0e-4
      codec:
        rate_scale: 1.0
        include_rz: true
    # Table 1 - Stage 5: same loss as stage 3, lowest LR
    - name: codec_stage_5
      optimize: codec
      epochs: 4
      lr: 1.0e-5
      weight_decay: 1.0e-4
      codec:
        rate_scale: 1.0
        include_rz: true
    # Stage 2 (paper): optimize FST for downstream segmentation after codec convergence
    - name: fst_stage_1
      optimize: fst
      epochs: 10
      lr: 1.0e-5
      weight_decay: 1.0e-4
      codec:
        rate_scale: 1.0
        include_rz: true

loss_weights:
  codec:
    # Eq.(5): L_codec = λ_R(R_r+R_m) + λ_f D_f + λ_c D_c + λ_p D_p
    # Implementation details: lambda_f=16, lambda_c=0.1*lambda_f=1.6, lambda_p=4
    lambda_r: 16.0
    lambda_f: 16.0
    lambda_c: 1.6
    lambda_p: 4.0
  fst:
    # Eq.(7): L_FST = λ_task L_task + λ_x D_x + λ_mid D_mid + λ_high D_high
    # Semantic segmentation setting (Table 2)
    lambda_task: 10.0
    lambda_x: 1024.0
    lambda_mid: 16.0
    lambda_high: 64.0

logging:
  use_tqdm: true
  log_batch_metrics: true
  batch_log_interval: 1
  comet:
    enabled: true
    api_key: mkfmxVIjacb8h74qKO6NzPdPN
    project_name: roi-vfc
    workspace: dangdinh17

output:
  save_dir: outputs/roi_vfc_deeplabv3_ytvos_codec_bitrate16
  save_every_epoch: true
